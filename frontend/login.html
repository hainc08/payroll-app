<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | PayRoll VN</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-box" style="margin: 0 auto 20px;">
                <i data-lucide="clock" style="color: white;"></i>
            </div>
            <h1>Chào mừng trở lại</h1>
            <p>Hệ thống Quản lý Lương Nhà hàng ABC</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email công ty</label>
                <input type="email" id="email" class="form-control" placeholder="user@abc.vn" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div id="loginError" class="text-danger hidden"></div>

            <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                Đăng nhập
                <i data-lucide="arrow-right"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <p style="font-size: 14px; color: var(--slate-500);">
                Quên mật khẩu? Liên hệ Admin bộ phận.
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
